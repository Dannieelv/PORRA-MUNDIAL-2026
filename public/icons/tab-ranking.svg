<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Star on top -->
  <polygon points="24,2 26.5,9.5 34,9.5 28,14 30.5,21.5 24,17 17.5,21.5 20,14 14,9.5 21.5,9.5" fill="#F59E0B"/>
  <!-- Podium bars -->
  <!-- 1st place (center, tallest) -->
  <rect x="18" y="24" width="12" height="20" fill="#EA580B"/>
  <text x="24" y="38" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="900" fill="#fff">1</text>
  <!-- 2nd place (left) -->
  <rect x="4" y="30" width="12" height="14" fill="#EA580B" opacity="0.7"/>
  <text x="10" y="41" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="900" fill="#fff">2</text>
  <!-- 3rd place (right) -->
  <rect x="32" y="33" width="12" height="11" fill="#EA580B" opacity="0.5"/>
  <text x="38" y="41" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="900" fill="#fff">3</text>
  <!-- Base line -->
  <rect x="2" y="44" width="44" height="2" fill="#EA580B" opacity="0.4"/>
</svg>
