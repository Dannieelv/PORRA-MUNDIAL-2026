name: Sync World Cup Results

on:
  schedule:
    # 1 vez al día a las 23:00 hora España (UTC+2 verano = 21:00 UTC)
    - cron: '0 21 * * *'
  workflow_dispatch:              # permite ejecutarlo manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync resultados
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/sync-results.mjs
