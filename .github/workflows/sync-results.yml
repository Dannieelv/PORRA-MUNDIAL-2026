name: Sync World Cup Results

on:
  schedule:
    # Cada 30 minutos del 11 jun al 19 jul 2026 (UTC)
    # GitHub Actions usa cron UTC; el torneo va de ~18:00 a ~02:00 UTC cada día
    - cron: '*/30 * 11-30 6 *'   # junio días 11-30
    - cron: '*/30 * 1-19 7 *'    # julio días 1-19
  workflow_dispatch:              # permite ejecutarlo manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync resultados
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/sync-results.mjs
